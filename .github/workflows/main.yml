name: Pipeline DevOps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Instalar Dependências
      run: |
        pip install flask
    - name: Teste de Sintaxe
      run: |
        python -m py_compile app.py

  deploy:
    runs-on: ubuntu-latest
    needs: build  # Isso aqui cria a linha de conexão entre as caixas!
    steps:
    - name: Simulação de Deploy
      run: |
        echo "Aplicação entregue com sucesso no ambiente de produção!"