name: CI - Verificação de Código

on:
  push:
    branches: [ "main", "seu-branch-de-estudo" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install flask

    - name: Lint com flake8 (Opcional - verifica erros de escrita)
      run: |
        pip install flake8
        # Para o build se houver erros de sintaxe Python
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics